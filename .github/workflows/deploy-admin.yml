name: Deploy Training Grounds Admin

# Training Grounds admin portal only. CrossFit Karuna is a separate company and
# ships from its own repository (cchiofalo35/crossfit-karuna) — nothing shared.

on:
  push:
    branches: [main]
    paths:
      - 'packages/admin/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      # GitHub Pages on this account does not serve newly-deployed /assets/* files,
      # so build a single self-contained index.html (inline JS + CSS).
      - name: Build Training Grounds portal (single-file)
        env:
          VITE_BRAND: training-grounds
          VITE_BASE: /training-grounds-app/
        run: |
          npm run build --workspace=packages/admin
          node packages/admin/scripts/inline.mjs
          rm -rf packages/admin/dist/assets
          cp packages/admin/dist/index.html packages/admin/dist/404.html
          touch packages/admin/dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/admin/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
